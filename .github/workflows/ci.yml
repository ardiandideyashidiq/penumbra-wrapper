name: Release

on:
  push:
    tags:
      - nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.publish-release.outputs.release_id }}
    steps:
      - name: Create or reuse nightly release
        id: publish-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = 'nightly';
            const releaseBody = [
              '## PenumbraWrapper nightly',
              '',
              '### Installation',
              '',
              '**Windows:**',
              '- Download `.msi` for installation',
              '',
              '**Linux:**',
              '- **Fedora/openSUSE:** Download `.rpm`',
              '- **Debian/Ubuntu:** Download `.deb`',
            ].join('\n');

            let release;

            try {
              const response = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: 'PenumbraWrapper nightly',
                body: releaseBody,
                draft: false,
                prerelease: false,
                generate_release_notes: false,
                target_commitish: context.sha,
              });

              release = response.data;
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }

              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName,
              });

              release = response.data;
            }

            core.setOutput('release_id', String(release.id));

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,rpm
            install_linux_deps: true
          - platform: windows-latest
            bundles: msi
            install_linux_deps: false

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu only)
        if: matrix.install_linux_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --bundles ${{ matrix.bundles }}
          includeDebug: false
          includeRelease: true
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: nightly
          releaseDraft: false
          prerelease: false
